apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: k3s-test
servers: 1
agents: 2
image: rancher/k3s:v1.35.5-k3s1
ports:
  - port: 8080:80
    nodeFilters:
      - loadbalancer
options:
  k3d:
    wait: true
    timeout: 120s
  kubeconfig:
    updateDefaultKubeconfig: false
    switchCurrentContext: false
