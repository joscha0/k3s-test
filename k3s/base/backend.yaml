apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: k3s-auth
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 3000
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: k3s-auth
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: wait-for-mongodb
          image: mongo:8.2.6
          command: ["sh", "-c", "until mongosh \"$MONGODB_URI\" --quiet --eval \"db.adminCommand('ping')\"; do sleep 2; done"]
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MONGODB_URI
      containers:
        - name: backend
          image: k3s-auth-backend:local
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - secretRef:
                name: app-secrets
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 500m
              memory: 256Mi
